name: NuvioTV
options:
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
packages:
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer
    revision: 10a40a1c0001d75307ad5922d1d1bc0cb01c89b4
  # Pure-Swift YouTube stream extractor — the only way to play trailer
  # YouTube keys on tvOS (no WebKit/WKWebView, so no iframe embed).
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    exactVersion: 0.4.8
  # VLCKit as a binary xcframework; the tvOS slice vends module `TVVLCKit`.
  # Adds the VLC playback engine alongside KSPlayer.
  VLCKit:
    url: https://github.com/tylerjonesio/vlckit-spm
    from: 3.6.0
targets:
  NuvioTV:
    type: application
    platform: tvOS
    sources:
      - NuvioTV
    dependencies:
      - package: KSPlayer
      - package: YouTubeKit
      - package: VLCKit
        product: VLCKitSPM
      # libdovi (quietvoid/dovi_tool's dolby_vision crate, C API) —
      # cross-compiled Rust static lib for tvOS. Powers Dolby Vision
      # Profile 7 (dual-layer) → 8.1 RPU conversion so DV7 remuxes get
      # native DV output instead of the HDR10 base-layer tone-map.
      - framework: Vendor/libdovi.xcframework
        embed: false
      # ─── Top Shelf (Continue Watching on the tvOS home screen) ───
      # OFF. Confirmed: this device is signed with a free/Personal Team
      # Apple ID, and App Groups capability is UNAVAILABLE to Personal
      # Team accounts — full stop, not fixable by changing entitlements,
      # bundle ids, or how the project is signed. Top Shelf needs an app
      # group to hand data to its extension, so it can only ever work with
      # a paid Apple Developer Program membership ($99/yr). Do not
      # re-enable this without one — see the other two TOP SHELF spots
      # below, which must be re-enabled together.
      # - target: NuvioTopShelf
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: "Orivio TV"
        # tvOS apps omit this by default, but Sideloadly's iOS-derived IPA
        # validator (Cydia Impactor lineage) rejects a bundle without it as
        # "not a valid iOS app". Harmless on tvOS (ignored); the binary stays a
        # real AppleTVOS/arm64 app and installs to the Apple TV normally.
        LSRequiresIPhoneOS: true
        # Tracks the Android APK release this port mirrors (v0.7.15-beta).
        CFBundleShortVersionString: "0.7.15"
        UIUserInterfaceStyle: Dark
        # Plus Jakarta Sans — bundled for the Stremio theme's chrome typography.
        UIAppFonts:
          - PlusJakartaSans-Regular.ttf
          - PlusJakartaSans-Medium.ttf
          - PlusJakartaSans-Bold.ttf
        # Lets canOpenURL detect external players for handoff (Infuse etc.).
        LSApplicationQueriesSchemes:
          - infuse
          - infuse-x-callback
          - vlc-x-callback
          - nplayer-http
          - open-vidhub
        # Deep links: nuvio:// (open a title) + stremio:// (install an addon).
        CFBundleURLTypes:
          - CFBundleURLName: tv.nuvio.deeplink
            CFBundleURLSchemes:
              - nuvio
              - stremio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orivio.tv.appletv
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "3"
        # Tracks the Android APK release this port mirrors (v0.7.15-beta).
        MARKETING_VERSION: "0.7.15"
        CURRENT_PROJECT_VERSION: "1"
        # The sanitize script below writes into the built .app, so user
        # script sandboxing must be off or the phase is denied file access.
        ENABLE_USER_SCRIPT_SANDBOXING: false
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # ─── TOP SHELF (2 of 3) ─── App group entitlement, shared with the
        # extension. OFF — Personal Team accounts can't provision App
        # Groups. Only uncomment with a paid Developer Program membership,
        # together with the other two TOP SHELF spots.
        # CODE_SIGN_ENTITLEMENTS: Config/NuvioTV.entitlements
    postBuildScripts:
      # FFmpegKit (pulled in transitively by KSPlayer) ships
      # libshaderc_combined.framework with an underscore in its
      # CFBundleIdentifier (com.kintan.ksplayer.libshaderc_combined).
      # Underscores are illegal in a bundle id, so Xcode's product
      # validation phase rejects the embedded framework and the build
      # fails. VALIDATE_PRODUCT=NO does NOT gate this particular check,
      # and there is no build setting that disables it, so instead we
      # rewrite any offending embedded framework id to use hyphens and
      # re-sign the framework before validation runs.
      - name: "Sanitize embedded framework bundle IDs"
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          FW_DIR="${CODESIGNING_FOLDER_PATH}/Frameworks"
          [ -d "$FW_DIR" ] || exit 0
          IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:--}"
          for fw in "$FW_DIR"/*.framework; do
            plist="$fw/Info.plist"
            [ -f "$plist" ] || continue
            bid=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" 2>/dev/null || true)
            case "$bid" in
              *_*)
                newbid=$(printf '%s' "$bid" | tr '_' '-')
                /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $newbid" "$plist"
                codesign --force --sign "$IDENTITY" --timestamp=none "$fw"
                echo "note: sanitized bundle id $bid -> $newbid"
                ;;
            esac
          done
  # ─── TOP SHELF (3 of 3) ─── The extension target itself. OFF — see the
  # note on the dependency above (Personal Team accounts can't provision
  # App Groups). Renders Continue Watching on the tvOS home screen when
  # working (Android's "Watch Next" equivalent); reads a JSON snapshot
  # from the shared app group written by TopShelfExporter. Uncomment this
  # whole block together with the other two TOP SHELF spots ONLY once
  # signed in with a paid Apple Developer Program membership.
  # NuvioTopShelf:
  #   type: app-extension
  #   platform: tvOS
  #   sources:
  #     - NuvioTopShelf
  #     - path: NuvioTV/Core/AppGroupResolver.swift
  #       buildPhase: sources
  #   info:
  #     path: NuvioTopShelf/Info.plist
  #     properties:
  #       CFBundleDisplayName: NuvioTV
  #       CFBundleShortVersionString: "0.7.15"
  #       NSExtension:
  #         NSExtensionPointIdentifier: com.apple.tv-top-shelf
  #         NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).TopShelfProvider
  #   settings:
  #     base:
  #       PRODUCT_BUNDLE_IDENTIFIER: com.orivio.tv.appletv.topshelf
  #       SWIFT_VERSION: "5.9"
  #       TARGETED_DEVICE_FAMILY: "3"
  #       MARKETING_VERSION: "0.7.15"
  #       CURRENT_PROJECT_VERSION: "1"
  #       CODE_SIGN_ENTITLEMENTS: NuvioTopShelf/NuvioTopShelf.entitlements
  # UI-test target: drives the tvOS remote (XCUIRemote) to verify focus/menu
  # behavior, which osascript keystroke automation can't do. Simulator only.
  NuvioTVUITests:
    type: bundle.ui-testing
    platform: tvOS
    sources:
      - NuvioTVUITests
    dependencies:
      - target: NuvioTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orivio.tv.appletv.uitests
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "3"
        TEST_TARGET_NAME: NuvioTV
        CODE_SIGNING_ALLOWED: "NO"
schemes:
  NuvioTV:
    build:
      targets:
        NuvioTV: all
        NuvioTVUITests: [test]
    test:
      targets:
        - NuvioTVUITests
    run:
      config: Debug
      # KSPlayer's Metal renderer (MetalRender.textures) calls makeTexture and
      # tolerates a nil result via compactMap — fine on device. But the SIMULATOR
      # Debug run enables Metal API Validation, which ASSERTS (SIGABRT) on the
      # same texture instead of returning nil, crashing the app whenever a video
      # plays in the sim. Turn the validation layers off so the sim behaves like
      # the device (drop the frame, don't abort). No effect on real hardware.
      environmentVariables:
        - variable: MTL_DEBUG_LAYER
          value: "0"
          isEnabled: true
        - variable: MTL_SHADER_VALIDATION
          value: "0"
          isEnabled: true
